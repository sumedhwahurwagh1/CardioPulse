services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cardiopulse-backend
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cardiopulse-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
