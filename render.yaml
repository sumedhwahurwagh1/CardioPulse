services:
  - type: web
    name: cardiopulse-api
    env: python
    buildCommand: "pip install -r backend/requirements.txt && PYTHONPATH=. python backend/train_cli.py"
    startCommand: "PYTHONPATH=. uvicorn backend.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
